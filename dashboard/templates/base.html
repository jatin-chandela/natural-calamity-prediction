<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NatCal Predict{% endblock %} | NatCal Predict</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --nb-blue: #0d2b6e;
      --nb-blue-light: #1a3f9e;
    }
    body { background-color: #f4f6fa; font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar-brand { font-weight: 700; font-size: 1.2rem; letter-spacing: .3px; }
    .navbar-nav .nav-link { color: rgba(255,255,255,.85) !important; font-size: .92rem; }
    .navbar-nav .nav-link:hover { color: #fff !important; }
    .card { box-shadow: 0 1px 6px rgba(0,0,0,.09); border: 1px solid #e3e8f0; border-radius: 6px; }
    .risk-green  { color: #198754; font-weight: 600; }
    .risk-orange { color: #fd7e14; font-weight: 600; }
    .risk-red    { color: #dc3545; font-weight: 600; }
    .map-wrap    { border-radius: 6px; overflow: hidden; min-height: 420px; }
    .map-wrap iframe { width: 100%; height: 420px; border: none; }
    .btn-nb { background-color: var(--nb-blue); color: #fff; border: none; }
    .btn-nb:hover { background-color: var(--nb-blue-light); color: #fff; }
    .thead-nb { background-color: var(--nb-blue); color: #fff; }
    footer { background-color: var(--nb-blue); color: rgba(255,255,255,.75); font-size: .82rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: var(--nb-blue);">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="/">NatCal Predict</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <div class="navbar-nav ms-auto gap-1">
          <a class="nav-link px-3" href="/dashboard">Dashboard</a>
          <a class="nav-link px-3" href="/history">History</a>
          <a class="nav-link px-3" href="/#about">About</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 pb-5">
    {% block content %}{% endblock %}
  </div>

  <footer class="text-center py-3 mt-4">
    Natural Calamity Prediction &mdash; Federated Learning &nbsp;|&nbsp;
    Department of CSE, Delhi Technological University &nbsp;|&nbsp; B.Tech Project-I, AY 2025&ndash;26
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
